name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write        # create GitHub Release and upload assets
  packages: write        # push to GitHub Container Registry
  id-token: write        # needed for OIDC token (future signing)

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  # ── Run tests before releasing ─────────────────────────────────────────────
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Test
        run: go test -race -count=1 ./...

  # ── Build static binaries for all target platforms ─────────────────────────
  binaries:
    name: Build binaries
    runs-on: ubuntu-latest
    needs: test
    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
          - goos: linux
            goarch: arm64
          - goos: darwin
            goarch: amd64
          - goos: darwin
            goarch: arm64
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Build
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: "0"
        run: |
          VERSION=${GITHUB_REF_NAME}
          COMMIT=${GITHUB_SHA::8}
          BUILD_DATE=$(date -u +%Y-%m-%dT%H:%M:%SZ)
          go build \
            -ldflags="-s -w \
              -X main.version=${VERSION} \
              -X main.commit=${COMMIT} \
              -X main.buildDate=${BUILD_DATE}" \
            -o proxy-${{ matrix.goos }}-${{ matrix.goarch }} \
            ./cmd/proxy

      - name: Upload binary
        uses: actions/upload-artifact@v4
        with:
          name: proxy-${{ matrix.goos }}-${{ matrix.goarch }}
          path: proxy-${{ matrix.goos }}-${{ matrix.goarch }}

  # ── Build and push multi-arch Docker image ─────────────────────────────────
  docker:
    name: Docker
    runs-on: ubuntu-latest
    needs: test
    outputs:
      digest: ${{ steps.push.outputs.digest }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up QEMU (for cross-platform builds)
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            # Full semver tag:  v1.2.3  →  1.2.3
            type=semver,pattern={{version}}
            # Minor tag:        v1.2.3  →  1.2
            type=semver,pattern={{major}}.{{minor}}
            # Major tag:        v1.2.3  →  1
            type=semver,pattern={{major}}
            # latest on every release tag
            type=raw,value=latest

      - name: Build and push
        id: push
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            VERSION=${{ github.ref_name }}
            COMMIT=${{ github.sha }}
            BUILD_DATE=${{ github.event.head_commit.timestamp }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── Create GitHub Release and attach binary assets ─────────────────────────
  release:
    name: GitHub Release
    runs-on: ubuntu-latest
    needs: [binaries, docker]
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0   # full history needed to generate changelog

      - name: Download all binary artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist/

      - name: Make Linux/macOS binaries executable
        run: chmod +x dist/**/proxy-*

      - name: Create checksums
        working-directory: dist
        run: |
          find . -name 'proxy-*' -exec sha256sum {} \; | sed 's|.*/||' > sha256sums.txt

      - name: Generate changelog
        id: changelog
        run: |
          PREV_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")
          if [ -n "$PREV_TAG" ]; then
            RANGE="${PREV_TAG}..HEAD"
          else
            RANGE="HEAD"
          fi
          {
            echo "## What's changed"
            echo ""
            git log ${RANGE} --pretty=format:"- %s (%h)" --no-merges
          } > changelog.md
          cat changelog.md

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "Release ${{ github.ref_name }}"
          body_path: changelog.md
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
          files: |
            dist/proxy-linux-amd64/proxy-linux-amd64
            dist/proxy-linux-arm64/proxy-linux-arm64
            dist/proxy-darwin-amd64/proxy-darwin-amd64
            dist/proxy-darwin-arm64/proxy-darwin-arm64
            dist/sha256sums.txt
