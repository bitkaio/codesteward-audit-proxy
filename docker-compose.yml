# Local development stack: proxy + ClickHouse
#
# Quick start:
#   cp .env.example .env          # fill in AUDIT_PROJECT, etc.
#   docker compose up -d
#   export ANTHROPIC_BASE_URL=http://localhost:8080
#
# The proxy binds on localhost:8080.  The ClickHouse HTTP interface is
# available on localhost:8123 for local inspection (e.g. DBeaver, curl).
#
# Migrations are applied automatically on every `docker compose up` by the
# `migrate` service.  Only new (not-yet-applied) files are executed.

services:
  proxy:
    image: ghcr.io/codesteward/codesteward-audit-proxy:latest
    restart: unless-stopped
    ports:
      - "127.0.0.1:8080:8080"
    environment:
      PROXY_ADDR: "0.0.0.0:8080"
      CLICKHOUSE_DSN: "clickhouse://default:@clickhouse:9000/audit"
      CLICKHOUSE_DB: "audit"
      BATCH_SIZE: "100"
      BATCH_INTERVAL: "1s"
      LOG_LEVEL: "info"
      # Override these in .env or environment:
      AUDIT_PROJECT: "${AUDIT_PROJECT:-}"
      AUDIT_BRANCH: "${AUDIT_BRANCH:-}"
      AUDIT_CAPTURE_REQUESTS: "${AUDIT_CAPTURE_REQUESTS:-true}"
      AUDIT_SCRUB_PATTERNS: "${AUDIT_SCRUB_PATTERNS:-}"
      UPSTREAM_PROXY: "${UPSTREAM_PROXY:-}"
      OTEL_EXPORTER_OTLP_ENDPOINT: "${OTEL_EXPORTER_OTLP_ENDPOINT:-}"
    depends_on:
      migrate:
        condition: service_completed_successfully

  migrate:
    # Alpine + curl: drives migrations over the HTTP interface (8123).
    # Avoids clickhouse-client permission issues with the native protocol.
    image: alpine:3.21
    entrypoint: ["sh", "-c", "apk add -q --no-cache curl && sh /migrations/migrate.sh"]
    environment:
      CLICKHOUSE_HOST: clickhouse
      CLICKHOUSE_HTTP_PORT: "8123"
      CLICKHOUSE_DB: "audit"
      CLICKHOUSE_USER: "default"
      CLICKHOUSE_PASSWORD: ""
    volumes:
      - ./migrations:/migrations:ro
    depends_on:
      clickhouse:
        condition: service_healthy
    restart: "no"

  clickhouse:
    image: clickhouse/clickhouse-server:latest
    restart: unless-stopped
    ports:
      # HTTP interface — useful for local inspection; not needed by the proxy
      - "127.0.0.1:8123:8123"
      # Native protocol — used by the proxy
      - "127.0.0.1:9000:9000"
    environment:
      CLICKHOUSE_DB: "audit"
      CLICKHOUSE_USER: "default"
      CLICKHOUSE_PASSWORD: ""
      CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT: "1"
    volumes:
      - clickhouse-data:/var/lib/clickhouse
    healthcheck:
      test: ["CMD-SHELL", "clickhouse-client --query 'SELECT 1'"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

volumes:
  clickhouse-data:
